# ── Traefik Dashboard ─────────────────────────────────────────────────────────
# Exposes the Traefik dashboard at traefik.gbone.one via WARP only.
# Uses api@internal — Traefik's built-in service, no backend pod needed.
# TLS served by the wildcard cert via TLSStore default.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: traefik-dashboard
  namespace: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`traefik.gbone.one`)
      kind: Rule
      services:
        - name: api@internal
          kind: TraefikService

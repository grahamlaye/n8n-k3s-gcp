apiVersion: apps/v1
kind: Deployment
metadata:
  name: affine
  namespace: affine
  labels:
    service: affine
spec:
  replicas: 1
  selector:
    matchLabels:
      service: affine
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        service: affine
    spec:
      serviceAccountName: cloudsql-proxy
      initContainers:
        # ── Cloud SQL Auth Proxy (native sidecar) ─────────────────────────────
        # restartPolicy: Always makes this a K8s native sidecar — it starts
        # before all other init containers and keeps running for the pod lifetime.
        - name: cloudsql-proxy
          image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
          restartPolicy: Always
          args:
            - "--structured-logs"
            - "--port=5432"
            - "--private-ip"
            - "n8n-demo-lab:europe-west2:n8n-postgres"
          resources:
            requests:
              memory: "32Mi"
              cpu: "5m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          securityContext:
            runAsNonRoot: true

        # ── Migration init container ───────────────────────────────────────────
        # Runs DB schema migrations before the main app starts.
        # Equivalent to the affine_migration service in the official docker-compose.
        - name: affine-migration
          image: ghcr.io/toeverything/affine:stable
          command: ["node", "./scripts/self-host-predeploy.js"]
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: affine-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: affine-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: affine-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: affine-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: affine-secret
                  key: DB_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
            - name: REDIS_SERVER_HOST
              valueFrom:
                configMapKeyRef:
                  name: affine-config
                  key: REDIS_SERVER_HOST
          resources:
            requests:
              memory: "128Mi"
              cpu: "5m"
            limits:
              memory: "512Mi"
              cpu: "500m"

      containers:
        # ── Affine main container ──────────────────────────────────────────────
        - name: affine
          image: ghcr.io/toeverything/affine:stable
          ports:
            - containerPort: 3010
          env:
            # Non-secret config from ConfigMap
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: affine-config
                  key: NODE_ENV
            - name: AFFINE_SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: affine-config
                  key: AFFINE_SERVER_PORT
            - name: AFFINE_SERVER_EXTERNAL_URL
              valueFrom:
                configMapKeyRef:
                  name: affine-config
                  key: AFFINE_SERVER_EXTERNAL_URL
            - name: REDIS_SERVER_HOST
              valueFrom:
                configMapKeyRef:
                  name: affine-config
                  key: REDIS_SERVER_HOST
            - name: REDIS_SERVER_PORT
              valueFrom:
                configMapKeyRef:
                  name: affine-config
                  key: REDIS_SERVER_PORT
            # DB connection — host/name from ConfigMap, credentials from Secret
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: affine-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: affine-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: affine-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: affine-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: affine-secret
                  key: DB_PASSWORD
            # Constructed from the above — K8s resolves $(VAR) substitution
            - name: DATABASE_URL
              value: "postgresql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)"
            # Auth + admin credentials from Secret
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: affine-secret
                  key: NEXTAUTH_SECRET
            - name: AFFINE_ADMIN_EMAIL
              valueFrom:
                secretKeyRef:
                  name: affine-secret
                  key: AFFINE_ADMIN_EMAIL
            - name: AFFINE_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: affine-secret
                  key: AFFINE_ADMIN_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "15m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: affine-claim0
              mountPath: /root/.affine/storage

      restartPolicy: Always
      volumes:
        - name: affine-claim0
          persistentVolumeClaim:
            claimName: affine-claim0
